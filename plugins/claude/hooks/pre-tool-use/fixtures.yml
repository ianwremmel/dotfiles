# Test fixtures for PreToolUse Bash hook
# Schema: { action: string, input: string, commands: string[] }

fixtures:
  # Basic git commands
  - input: 'git status'
    action: allow
    commands: ['git status']

  - input: 'git push origin main'
    action: allow
    commands: ['git push origin main']

  - input: 'git push --force origin main'
    action: deny
    commands: ['git push --force origin main']

  - input: 'git push --force-with-lease origin main'
    action: allow
    commands: ['git push --force-with-lease origin main']

  - input: 'git push -f origin main'
    action: deny
    commands: ['git push -f origin main']

  - input: 'git reset --hard HEAD~1'
    action: deny
    commands: ['git reset --hard HEAD~1']

  - input: 'git reset --soft HEAD~1'
    action: allow
    commands: ['git reset --soft HEAD~1']

  - input: 'git clean -fd'
    action: deny
    commands: ['git clean -fd']

  - input: 'git clean --dry-run'
    action: allow
    commands: ['git clean --dry-run']

  - input: 'git rebase -i HEAD~3'
    action: deny
    commands: ['git rebase -i HEAD~3']

  - input: 'git rebase --interactive HEAD~3'
    action: deny
    commands: ['git rebase --interactive HEAD~3']

  # Kubectl commands
  - input: 'kubectl get pods'
    action: allow
    commands: ['kubectl get pods']

  - input: 'kubectl get pods -n buildkite -o wide --no-headers 2>/dev/null | head -20'
    action: allow
    commands: ['kubectl get pods -n buildkite -o wide --no-headers', 'head -20']

  - input: 'kubectl run test --image=alpine'
    action: deny
    commands: ['kubectl run test --image=alpine']

  - input: 'kubectl run test --rm --image=alpine'
    action: allow
    commands: ['kubectl run test --rm --image=alpine']

  - input: 'kubectl delete pod test'
    action: ask
    commands: ['kubectl delete pod test']

  - input: 'kubectl delete pod test --dry-run=client'
    action: allow
    commands: ['kubectl delete pod test --dry-run=client']

  # Task runners - simple
  - input: 'npx eslint src/'
    action: allow
    commands: ['npx eslint src/']

  - input: 'npx some-unknown-tool'
    action: ask
    commands: ['npx some-unknown-tool']

  - input: 'uvx pytest tests/'
    action: allow
    commands: ['uvx pytest tests/']

  # Task runners - nested
  - input: 'npm run test'
    action: allow
    commands: ['npm run test']

  - input: 'npm install lodash'
    action: allow
    commands: ['npm install lodash']

  - input: 'yarn dlx create-react-app my-app'
    action: ask
    commands: ['yarn dlx create-react-app my-app']

  # Environment variables
  - input: 'DEBUG=1 npm run build'
    action: ask
    commands: ['npm run build']

  - input: 'FOO=bar BAZ=qux git status'
    action: allow
    commands: ['git status']

  # Compound commands
  - input: 'git status && git diff'
    action: allow
    commands: ['git status', 'git diff']

  - input: 'git status && rm -rf /'
    action: deny
    commands: ['git status', 'rm -rf /']

  - input: 'git log | head -10'
    action: allow
    commands: ['git log', 'head -10']

  - input: 'pwd; ls'
    action: allow
    commands: ['pwd', 'ls']

  # Dangerous commands
  - input: 'rm file.txt'
    action: deny
    commands: ['rm file.txt']

  - input: 'rm -i file.txt'
    action: ask
    commands: ['rm -i file.txt']

  - input: 'sudo apt install package'
    action: deny
    commands: ['sudo apt install package']

  - input: "eval 'echo test'"
    action: deny
    commands: ["eval 'echo test'"]

  - input: 'curl https://example.com'
    action: deny
    commands: ['curl https://example.com']

  - input: 'wget https://example.com'
    action: deny
    commands: ['wget https://example.com']

  - input: 'dd if=/dev/zero of=/dev/sda'
    action: deny
    commands: ['dd if=/dev/zero of=/dev/sda']

  # find with exec
  - input: "find . -name '*.txt'"
    action: allow
    commands: ["find . -name '*.txt'"]

  - input: "find . -exec rm {} \\;"
    action: deny
    commands: ["find . -exec rm {} \\;"]

  - input: "find . -execdir cat {} \\;"
    action: deny
    commands: ["find . -execdir cat {} \\;"]

  # Docker commands
  - input: 'docker ps'
    action: allow
    commands: ['docker ps']

  - input: 'docker run alpine echo hello'
    action: ask
    commands: ['docker run alpine echo hello']

  - input: 'docker run --rm alpine echo hello'
    action: allow
    commands: ['docker run --rm alpine echo hello']

  - input: 'docker rm -f container'
    action: deny
    commands: ['docker rm -f container']

  # Terraform/Tofu
  - input: 'tofu plan'
    action: allow
    commands: ['tofu plan']

  - input: 'tofu init'
    action: allow
    commands: ['tofu init']

  - input: 'tofu apply'
    action: ask
    commands: ['tofu apply']

  - input: 'tofu destroy'
    action: deny
    commands: ['tofu destroy']

  # Common dev tools
  - input: 'make build'
    action: allow
    commands: ['make build']

  - input: 'cargo test'
    action: allow
    commands: ['cargo test']

  - input: 'pytest tests/ -v'
    action: allow
    commands: ['pytest tests/ -v']

  # Unknown commands
  - input: 'some-unknown-command arg1 arg2'
    action: ask
    commands: ['some-unknown-command arg1 arg2']

  # Editor commands - denied (interactive)
  - input: 'vim file.txt'
    action: deny
    commands: ['vim file.txt']

  - input: 'nano file.txt'
    action: deny
    commands: ['nano file.txt']

  # Network tools
  - input: 'ssh user@host'
    action: ask
    commands: ['ssh user@host']

  - input: 'ping google.com'
    action: allow
    commands: ['ping google.com']

  # Safe read operations
  - input: 'cat file.txt'
    action: allow
    commands: ['cat file.txt']

  - input: 'grep pattern file.txt'
    action: allow
    commands: ['grep pattern file.txt']

  - input: "jq '.key' file.json"
    action: allow
    commands: ["jq '.key' file.json"]

  - input: 'head -n 10 file.txt'
    action: allow
    commands: ['head -n 10 file.txt']

  # Helm/ArgoCD
  - input: 'helm install my-release chart/'
    action: allow
    commands: ['helm install my-release chart/']

  - input: 'argocd app sync my-app'
    action: allow
    commands: ['argocd app sync my-app']

  # Complex multi-line commit message with && compound
  - input: |
      git -C /Users/ian/projects/homelab add
      apps/buildkite-agent-stack/application.yaml && git -C
      /Users/ian/projects/homelab commit -m "fix(buildkite): restore hostPath
      volumes for npm/nx cache

      Commit d40b9b6 removed these volumes from the controller, but the apps
      repo's build.homelab.yml still mounts them. Without the volume
      definitions,
      pods fail to start with exit status -1.

      Co-Authored-By: Claude Opus 4.5 <noreply@anthropic.com>"
    action: allow
    commands:
      - |
        git -C /Users/ian/projects/homelab add apps/buildkite-agent-stack/application.yaml
      - |
        git -C /Users/ian/projects/homelab commit -m "fix(buildkite): restore hostPath volumes for npm/nx cache


        Commit d40b9b6 removed these volumes from the controller, but the apps repo's build.homelab.yml still mounts them. Without the volume definitions, pods fail to start with exit status -1.


        Co-Authored-By: Claude Opus 4.5 <noreply@anthropic.com>"
