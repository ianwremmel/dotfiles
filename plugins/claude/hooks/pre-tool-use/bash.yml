# Claude Code Bash Hook Configuration
# Controls which commands are allowed, denied, or require confirmation

logging:
  enabled: true
  path: "$HOME/.claude/logs/pre-tool-use/bash.log"

# Task runners - commands that execute other commands
taskRunners:
  # Simple task runners: first argument is the actual command
  simple:
    - npx
    - uvx
    - bunx
    - pnpx

  # Nested task runners: subcommand triggers task runner mode
  nested:
    npm:
      - run
      - exec
    yarn:
      - run
      - dlx
    pnpm:
      - run
      - exec
      - dlx

# Command rules - first matching rule wins
commands:
  # ============================================
  # Shell builtins and simple commands
  # ============================================
  "[":
    action: allow
  "true":
    action: allow
  "false":
    action: allow
  test:
    action: allow
  echo:
    action: allow
  printf:
    action: allow
  pwd:
    action: allow
  cd:
    action: allow
  export:
    action: allow
  env:
    action: allow
  printenv:
    action: allow
  set:
    action: ask
  unset:
    action: ask
  source:
    action: ask
  ".":
    action: ask
  eval:
    action: deny
  exec:
    action: deny

  # ============================================
  # File viewing/inspection - always safe
  # ============================================
  cat:
    action: allow
  head:
    action: allow
  tail:
    action: allow
  less:
    action: allow
  more:
    action: allow
  ls:
    action: allow
  file:
    action: allow
  stat:
    action: allow
  wc:
    action: allow
  diff:
    action: allow
  which:
    action: allow
  whereis:
    action: allow
  realpath:
    action: allow
  basename:
    action: allow
  dirname:
    action: allow

  # ============================================
  # Text processing
  # ============================================
  grep:
    action: allow
  awk:
    action: allow
  sed:
    action: allow
  cut:
    action: allow
  sort:
    action: allow
  uniq:
    action: allow
  tr:
    action: allow
  jq:
    action: allow
  yq:
    action: allow
  xargs:
    action: allow

  # ============================================
  # System info
  # ============================================
  uname:
    action: allow
  hostname:
    action: allow
  whoami:
    action: allow
  nproc:
    action: allow
  uptime:
    action: allow
  df:
    action: allow
  du:
    action: allow
  free:
    action: allow
  date:
    action: allow
  ps:
    action: allow
  top:
    action: deny
  htop:
    action: deny

  # ============================================
  # File operations
  # ============================================
  mkdir:
    action: allow
  touch:
    action: allow
  cp:
    action: ask
  mv:
    action: ask
  chmod:
    action: allow
  chown:
    action: deny
  chgrp:
    action: deny
  rm:
    action: deny
    rules:
      - switches: ["-i"]
        action: ask

  # ============================================
  # Network tools
  # ============================================
  ping:
    action: allow
  host:
    action: allow
  nslookup:
    action: allow
  dig:
    action: allow
  curl:
    action: deny
  wget:
    action: deny
  ssh:
    action: ask
  scp:
    action: ask

  # ============================================
  # Dangerous disk operations
  # ============================================
  dd:
    action: deny
  mkfs:
    action: deny
  sudo:
    action: deny
  su:
    action: deny

  # ============================================
  # find - allow but deny -exec variants
  # ============================================
  find:
    action: allow
    rules:
      - switches: ["-exec"]
        action: deny
      - switches: ["-execdir"]
        action: deny
      - switches: ["-ok"]
        action: deny

  # ============================================
  # Git commands
  # ============================================
  git:
    action: allow
    rules:
      - switches: ["--force"]
        action: deny
    subcommands:
      status:
        action: allow
      diff:
        action: allow
      log:
        action: allow
      show:
        action: allow
      branch:
        action: allow
      checkout:
        action: allow
      switch:
        action: allow
      add:
        action: allow
      commit:
        action: allow
      fetch:
        action: allow
      pull:
        action: allow
      merge:
        action: allow
      stash:
        action: allow
      tag:
        action: allow
      remote:
        action: allow
      push:
        action: allow
        rules:
          - switches: ["--force-with-lease"]
            action: allow
          - switches: ["--force"]
            action: deny
          - switches: ["-f"]
            action: deny
      rebase:
        action: allow
        rules:
          - switches: ["-i"]
            action: deny
          - switches: ["--interactive"]
            action: deny
      reset:
        action: ask
        rules:
          - switches: ["--hard"]
            action: deny
          - switches: ["--soft"]
            action: allow
      clean:
        action: deny
        rules:
          - switches: ["-n"]
            action: allow
          - switches: ["--dry-run"]
            action: allow

  # ============================================
  # GitHub CLI
  # ============================================
  gh:
    action: allow

  # ============================================
  # Kubernetes
  # ============================================
  kubectl:
    action: allow
    subcommands:
      get:
        action: allow
      describe:
        action: allow
      logs:
        action: allow
      config:
        action: allow
      apply:
        action: allow
      run:
        action: deny
        rules:
          - switches: ["--rm"]
            action: allow
      exec:
        action: ask
      delete:
        action: ask
        rules:
          - switches: ["--dry-run"]
            action: allow

  talosctl:
    action: allow

  # ============================================
  # Helm / ArgoCD / Argo
  # ============================================
  helm:
    action: allow

  argocd:
    action: allow

  argo:
    action: allow

  # ============================================
  # Terraform/OpenTofu
  # ============================================
  tofu:
    action: ask
    subcommands:
      plan:
        action: allow
      init:
        action: allow
      validate:
        action: allow
      apply:
        action: ask
      destroy:
        action: deny

  terraform:
    action: ask
    subcommands:
      plan:
        action: allow
      init:
        action: allow
      validate:
        action: allow
      apply:
        action: ask
      destroy:
        action: deny

  # ============================================
  # Docker
  # ============================================
  docker:
    action: ask
    subcommands:
      ps:
        action: allow
      images:
        action: allow
      logs:
        action: allow
      inspect:
        action: allow
      build:
        action: allow
      run:
        action: ask
        rules:
          - switches: ["--rm"]
            action: allow
      exec:
        action: ask
      stop:
        action: ask
      rm:
        action: ask
        rules:
          - switches: ["-f"]
            action: deny
      rmi:
        action: ask
      system:
        action: deny

  # ============================================
  # Build/Dev tools
  # ============================================
  make:
    action: allow
  npm:
    action: allow
  yarn:
    action: allow
  pnpm:
    action: allow
  bun:
    action: allow
  node:
    action: allow
  deno:
    action: allow
  cargo:
    action: allow
  go:
    action: allow
  python:
    action: allow
  python3:
    action: allow
  pip:
    action: allow
  pip3:
    action: allow
  ruby:
    action: allow
  bundle:
    action: allow
  gem:
    action: allow
  mvn:
    action: allow
  gradle:
    action: allow
  swift:
    action: allow

  # ============================================
  # Test runners
  # ============================================
  pytest:
    action: allow
  jest:
    action: allow
  mocha:
    action: allow
  vitest:
    action: allow
  rspec:
    action: allow
  bats:
    action: allow

  # ============================================
  # Linters and formatters
  # ============================================
  eslint:
    action: allow
  prettier:
    action: allow
  black:
    action: allow
  ruff:
    action: allow
  mypy:
    action: allow
  flake8:
    action: allow
  pylint:
    action: allow
  rubocop:
    action: allow
  shellcheck:
    action: allow
  hadolint:
    action: allow

  # ============================================
  # Build tools
  # ============================================
  webpack:
    action: allow
  vite:
    action: allow
  esbuild:
    action: allow
  rollup:
    action: allow
  tsc:
    action: allow
  babel:
    action: allow

  # ============================================
  # Misc utilities
  # ============================================
  sleep:
    action: allow
  tee:
    action: allow
  brew:
    action: allow
  mas:
    action: allow
  afplay:
    action: allow

  # ============================================
  # Editor commands - denied (interactive)
  # ============================================
  vim:
    action: deny
  vi:
    action: deny
  nano:
    action: deny
  emacs:
    action: deny
